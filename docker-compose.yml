# FlowOps — n8n queue mode (LOCAL dev via ngrok tunnel)
# main + webhook + 2 workers + redis + postgres. Caddy skipped locally (ngrok = HTTPS).
# Start ngrok FIRST, put its URL in .env as WEBHOOK_URL, then: docker compose up -d

x-n8n-common: &n8n-common
  image: n8nio/n8n:latest
  restart: unless-stopped
  environment: &n8n-env
    EXECUTIONS_MODE: queue
    QUEUE_BULL_REDIS_HOST: redis
    QUEUE_BULL_REDIS_PORT: 6379
    DB_TYPE: postgresdb
    DB_POSTGRESDB_HOST: postgres
    DB_POSTGRESDB_PORT: 5432
    DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
    DB_POSTGRESDB_USER: ${N8N_DB_USER:-n8n}
    DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD:?set N8N_DB_PASSWORD in .env}
    N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?set N8N_ENCRYPTION_KEY in .env}
    GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-UTC}
    # Contract B workflows read secrets via $env in HTTP/Code nodes (no n8n
    # credentials object is used). n8n blocks $env inside nodes unless this is
    # set to 'false'. Without it every Code/HTTP node throws "access to env
    # vars denied". Safe in dev/Lead-only; tighten before shared deploys.
    N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
    # FlowOps app data lives in Supabase (not the local n8n postgres above).
    # Service workflows read these via $env in HTTP/Code nodes (Contract B).
    SUPABASE_URL: ${SUPABASE_URL:-}
    SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
    # Public base URL n8n calls back on (idempotency-check, HITL resume). = ngrok URL.
    N8N_DOMAIN: ${WEBHOOK_URL:-http://localhost:5678}
    # Telegram approver chat for HITL messages (Contract B onboarding).
    TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    # Telegram bot token — G1 global-error handler alerts (Code-node HTTP, non-throwing).
    TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    # GitHub Issues back Service 4 support SLA scanning/escalation.
    GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    GITHUB_REPO: ${GITHUB_REPO:-}
    GITHUB_SLA_LABEL: ${GITHUB_SLA_LABEL:-sla-watch}
    GITHUB_SLA_HOURS: ${GITHUB_SLA_HOURS:-48}
    # Service 6/7 batch defaults.
    HEALTH_RISK_THRESHOLD: ${HEALTH_RISK_THRESHOLD:-70}
    RENEWAL_WINDOW_DAYS: ${RENEWAL_WINDOW_DAYS:-45}
    # G1 fetches the failed execution's runData back via the n8n REST API to recover
    # correlation_id + the original payload (the Error Trigger payload omits runData).
    # Internal URL = the main container over the compose network (workers run G1).
    N8N_API_KEY: ${N8N_API_KEY:-}
    N8N_INTERNAL_URL: ${N8N_INTERNAL_URL:-http://n8n-main:5678}
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${N8N_DB_NAME:-n8n}
      POSTGRES_USER: ${N8N_DB_USER:-n8n}
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD:?set N8N_DB_PASSWORD in .env}
    volumes:
      - n8n-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${N8N_DB_USER:-n8n} -d ${N8N_DB_NAME:-n8n}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ngrok tunnel (container) — public HTTPS URL pointing at n8n-main.
  # Inspector/API at http://localhost:5040  (query /api/tunnels for the live public URL).
  # Host port 5040 (not the usual 4040) because Windows reserves 3957-4056.
  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command: http n8n-main:5678 --log=stdout
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    ports:
      - "5040:4040"
    depends_on:
      - n8n-main

  # Main: UI, scheduler, REST API. Editor at http://localhost:5678
  n8n-main:
    <<: *n8n-common
    ports:
      - "5678:5678"
    environment:
      <<: *n8n-env
      N8N_METRICS: "true"                       # Contract E — /metrics for Grafana
      # ngrok public URL so webhook nodes generate correct external URLs.
      # Phase 1 (first boot): localhost placeholder. Phase 2: real ngrok URL fetched
      # from http://localhost:4040/api/tunnels and written to .env, then n8n recreated.
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678}
      N8N_EDITOR_BASE_URL: ${WEBHOOK_URL:-http://localhost:5678}
    volumes:
      - n8n-main:/home/node/.n8n

  # Webhook process: receives inbound webhooks (Stripe, Telegram, DSAR, replay).
  n8n-webhook:
    <<: *n8n-common
    command: webhook
    environment:
      <<: *n8n-env
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678}

  # Workers: pull jobs off Redis and execute them. Scale: docker compose up -d --scale n8n-worker=3
  n8n-worker:
    <<: *n8n-common
    command: worker
    deploy:
      replicas: 2

volumes:
  n8n-postgres:
  n8n-main:
